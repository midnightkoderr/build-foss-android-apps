name: Build KeePassDX APKs

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      KEYSTORE_BASE64:
        required: true
      STORE_PASSWORD:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone upstream KeePassDX
        uses: actions/checkout@v4
        with:
          repository: Kunzisoft/KeePassDX
          ref: ${{ inputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install NDK 25.2.9519653
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Patch app/build.gradle
        run: |
          python3 << 'PYEOF'
          import re, sys

          with open('app/build.gradle', 'r') as f:
              content = f.read()

          # 1. signingConfigs block — inserted after compileSdkVersion (version-agnostic)
          signing_block = (
              '\n'
              '    signingConfigs {\n'
              '        release {\n'
              '            def keystorePath = System.getenv("KEYSTORE_PATH")\n'
              '            if (keystorePath) {\n'
              '                storeFile = file(keystorePath)\n'
              '                storePassword = System.getenv("STORE_PASSWORD")\n'
              '                keyAlias = System.getenv("KEY_ALIAS")\n'
              '                keyPassword = System.getenv("KEY_PASSWORD")\n'
              '            }\n'
              '        }\n'
              '    }\n'
          )
          content, n = re.subn(r'(    compileSdkVersion \d+\n)', r'\1' + signing_block, content)
          assert n == 1, f"PATCH FAILED: compileSdkVersion anchor not found (matched {n} times)"

          # 2. ndk abiFilters inside defaultConfig
          ndk_block = (
              '\n'
              '        ndk {\n'
              '            abiFilters "arm64-v8a"\n'
              '        }\n'
          )
          anchor = '        manifestPlaceholders = [ googleAndroidBackupAPIKey:"unused" ]\n'
          assert anchor in content, "PATCH FAILED: manifestPlaceholders anchor not found"
          content = content.replace(anchor, anchor + ndk_block, 1)

          # 3. signing config wired into release buildType — regex finds minifyEnabled inside release {}
          signing_ref = (
              '\n            if (System.getenv("KEYSTORE_PATH")) {'
              '\n                signingConfig = signingConfigs.release'
              '\n            }'
          )
          content, n = re.subn(
              r'(buildTypes\s*\{.*?release\s*\{.*?)(minifyEnabled\s*=?\s*false)',
              r'\1\2' + signing_ref,
              content, count=1, flags=re.DOTALL
          )
          assert n == 1, "PATCH FAILED: buildTypes.release.minifyEnabled anchor not found"

          # 4. librefree flavor — libre settings with .free package name — inserted before free flavor
          librefree_block = (
              '        librefree {\n'
              '            dimension "version"\n'
              '            applicationIdSuffix = ".free"\n'
              '            buildConfigField "String", "BUILD_VERSION", "\\"libre\\""\n'
              '            buildConfigField "boolean", "CLOSED_STORE", "false"\n'
              '            buildConfigField "String[]", "STYLES_DISABLED",\n'
              '                            "{\\"KeepassDXStyle_Red\\"," +\n'
              '                            "\\"KeepassDXStyle_Red_Night\\"," +\n'
              '                            "\\"KeepassDXStyle_Reply\\"," +\n'
              '                            "\\"KeepassDXStyle_Reply_Night\\"," +\n'
              '                            "\\"KeepassDXStyle_Purple\\"," +\n'
              '                            "\\"KeepassDXStyle_Purple_Dark\\"," +\n'
              '                            "\\"KeepassDXStyle_Dynamic_Light\\"," +\n'
              '                            "\\"KeepassDXStyle_Dynamic_Night\\"}" \n'
              '            buildConfigField "String[]", "ICON_PACKS_DISABLED", "{}"\n'
              '        }\n'
          )
          anchor = '        free {\n            dimension "version"\n'
          assert anchor in content, "PATCH FAILED: free flavor anchor not found"
          content = content.replace(anchor, librefree_block + anchor, 1)

          # 5. librefree source sets
          anchor = "        libre.res.srcDir 'src/libre/res'\n        free.res.srcDir 'src/free/res'"
          assert anchor in content, "PATCH FAILED: sourceSets anchor not found"
          content = content.replace(
              anchor,
              "        libre.res.srcDir 'src/libre/res'\n"
              "        librefree.res.srcDir 'src/libre/res'\n"
              "        librefree.assets.srcDir 'src/free/assets'\n"
              "        free.res.srcDir 'src/free/res'",
              1
          )

          with open('app/build.gradle', 'w') as f:
              f.write(content)

          print("All 5 patches applied successfully")
          PYEOF

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/keystore.jks

      - name: Build libre APK (com.kunzisoft.keepass.libre)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleLibreRelease

      - name: Rename libre APK
        run: mv app/build/outputs/apk/libre/release/app-libre-release.apk app/build/outputs/apk/libre/release/KeePassDX_libre_arm64v8a_${{ inputs.version }}.apk

      - name: Build librefree APK (com.kunzisoft.keepass.free)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleLibrefreeRelease

      - name: Rename free APK
        run: mv app/build/outputs/apk/librefree/release/app-librefree-release.apk app/build/outputs/apk/librefree/release/KeePassDX_free_arm64v8a_${{ inputs.version }}.apk

      - name: Stage APKs
        uses: actions/upload-artifact@v4
        with:
          name: keepassdx-apks
          path: |
            app/build/outputs/apk/libre/release/KeePassDX_libre_arm64v8a_${{ inputs.version }}.apk
            app/build/outputs/apk/librefree/release/KeePassDX_free_arm64v8a_${{ inputs.version }}.apk
          retention-days: 1
