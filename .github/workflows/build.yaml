name: Strip ABIs from FOSS Android APKs

on:
  schedule:
    - cron: '30 6 * * 6' # Every Saturday 06:30 UTC
  workflow_dispatch:

env:
  JDK_VERSION: 17
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache JDK
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/Java_*_jdk/${{ env.JDK_VERSION }}*
          key: jdk-${{ runner.os }}-${{ env.JAVA_DISTRIBUTION }}-${{ env.JDK_VERSION }}

      - name: Set up JDK ${{ env.JDK_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Decode and verify keystore
        env:
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > "${GITHUB_WORKSPACE}/keystore.jks"
          keytool -list \
            -keystore "${GITHUB_WORKSPACE}/keystore.jks" \
            -storepass "${STORE_PASS}" \
            -alias "${KEY_ALIAS}"

      - name: Check upstream versions
        run: |
          set -euo pipefail

          # An app changed when its stored version differs from the upstream
          # latest release tag. The repo to query is parsed from the first URL.
          changed='[]'
          while read -r key; do
            stored=$(jq -r --arg k "$key" '.[$k].version // ""' config.json)
            first_url=$(jq -r --arg k "$key" '.[$k].urls[0]' config.json)
            repo=$(sed -E 's#https?://github.com/([^/]+/[^/]+)/.*#\1#' <<<"$first_url")
            latest=$(curl -fsSL "https://api.github.com/repos/$repo/releases/latest" | jq -r '.tag_name // ""')
            echo "$key: stored=$stored latest=$latest (repo=$repo)"
            if [ -z "$latest" ] || [ "$latest" = "null" ]; then
              echo "  !! could not resolve latest tag for $repo, skipping"
              continue
            fi
            # Empty version => always build latest; otherwise build only when it differs.
            if [ -z "$stored" ] || [ "$stored" != "$latest" ]; then
              urls=$(jq -c --arg k "$key" '.[$k].urls' config.json)
              entry=$(jq -nc --arg k "$key" --arg v "$latest" --argjson u "$urls" \
                '{key: $k, version: $v, urls: $u}')
              changed=$(jq -c --argjson e "$entry" '. + [$e]' <<<"$changed")
            fi
          done < <(jq -r 'keys[]' config.json)

          echo "CHANGED=$changed" >> "$GITHUB_ENV"
          if [ "$(jq 'length' <<<"$changed")" -gt 0 ]; then
            echo "ANY_CHANGED=true" >> "$GITHUB_ENV"
          else
            echo "ANY_CHANGED=false" >> "$GITHUB_ENV"
          fi

      - name: Repackage APKs (strip ABIs, re-sign)
        if: env.ANY_CHANGED == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          mkdir -p dist

          # KeePassDX-{TAG}-libre.apk  ->  KeePassDX_libre_arm64v8a_{TAG}.apk
          outname() {
            python3 - "$1" "$2" <<'PY'
          import sys
          fname, version = sys.argv[1], sys.argv[2]
          stem = fname[:-4] if fname.endswith('.apk') else fname
          tokens = [t for t in stem.split('-') if t != version]
          print('_'.join(tokens) + f'_arm64v8a_{version}.apk')
          PY
          }

          repackage() {
            local src="$1" out="$2"
            local aligned="aligned_$(basename "$src")"

            echo "::group::Repackage $src -> $(basename "$out")"

            # Drop every native-lib ABI except arm64-v8a, straight out of the
            # zip — no decompile/recompile, so compiled resources stay intact.
            for abi in $(unzip -Z1 "$src" 'lib/*' 2>/dev/null | sed -E 's#^lib/([^/]+)/.*#\1#' | sort -u); do
              if [ "$abi" != "arm64-v8a" ]; then
                echo "Removing lib/$abi"
                zip -dq "$src" "lib/$abi/*"
              fi
            done
            echo "Remaining ABIs:"
            unzip -Z1 "$src" 'lib/*' 2>/dev/null | sed -E 's#^lib/([^/]+)/.*#\1#' | sort -u || echo "(none)"

            # Align (page-align uncompressed .so for in-place loading)
            "$BUILD_TOOLS/zipalign" -f -p 4 "$src" "$aligned"

            # Re-sign with personal key (replaces the upstream signature)
            "$BUILD_TOOLS/apksigner" sign \
              --ks "$GITHUB_WORKSPACE/keystore.jks" \
              --ks-pass env:STORE_PASSWORD \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass env:KEY_PASSWORD \
              --out "$out" \
              "$aligned"

            # Verify signature + alignment
            "$BUILD_TOOLS/apksigner" verify --verbose "$out"

            echo "::endgroup::"
          }

          # Flatten every changed app into "version<TAB>url" lines, with {TAG} substituted.
          while IFS=$'\t' read -r version url; do
            [ -n "$url" ] || continue
            fname=$(basename "$url")
            echo "Downloading $url"
            curl -fsSL -o "$fname" "$url"
            repackage "$fname" "dist/$(outname "$fname" "$version")"
          done < <(jq -r '.[] | .version as $v | .urls[] | [$v, gsub("\\{TAG\\}"; $v)] | @tsv' <<<"$CHANGED")

      - name: Determine next release tag
        id: tag
        if: env.ANY_CHANGED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName // "v0"' 2>/dev/null || echo "v0")
          num=$(echo "$latest" | sed 's/v//')
          echo "tag=v$((num + 1))" >> $GITHUB_OUTPUT

      - name: Compose release notes
        if: env.ANY_CHANGED == 'true'
        run: |
          set -euo pipefail
          {
            echo "## Apps"
            jq -r '.[]
              | (.urls[0] | capture("github.com/(?<repo>[^/]+/[^/]+)/").repo) as $repo
              | "- **\($repo | split("/")[1])** `\(.version)` — [upstream release](https://github.com/\($repo)/releases/tag/\(.version))"' \
              <<<"$CHANGED"
            echo ""
            echo "## Checksums"
            echo "| File | SHA256 | CRC32 |"
            echo "|------|--------|-------|"
          } > notes.md
          find dist -name "*.apk" | sort | while read -r apk; do
            name=$(basename "$apk")
            sha256=$(sha256sum "$apk" | awk '{print $1}')
            crc32=$(python3 -c "import binascii; d=open('$apk','rb').read(); print(format(binascii.crc32(d)&0xffffffff,'08x'))")
            echo "| \`$name\` | \`$sha256\` | \`$crc32\` |" >> notes.md
          done

      - name: Create release
        if: env.ANY_CHANGED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file notes.md \
            $(find dist -name "*.apk")

      - name: Update config.json
        if: env.ANY_CHANGED == 'true'
        run: |
          set -euo pipefail
          while read -r app; do
            k=$(jq -r '.key' <<<"$app")
            v=$(jq -r '.version' <<<"$app")
            jq --arg k "$k" --arg v "$v" '.[$k].version = $v' config.json > tmp.json
            mv tmp.json config.json
          done < <(jq -c '.[]' <<<"$CHANGED")

      - name: Commit updated versions
        if: env.ANY_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git commit -m "chore: release ${{ steps.tag.outputs.tag }}"
          git push
