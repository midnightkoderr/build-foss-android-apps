name: Build FOSS Android APKs

on:
  schedule:
    - cron: '30 6 * * 6'  # Every Saturday 06:30 UTC
  workflow_dispatch:

jobs:
  prerequisites:
    runs-on: ubuntu-latest
    outputs:
      keepassdx_version: ${{ steps.keepassdx.outputs.version }}
      keepassdx_changed: ${{ steps.keepassdx.outputs.changed }}
    steps:
      - name: Verify keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "KEYSTORE_BASE64 hash: $(printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]' | sha256sum | cut -d' ' -f1)"
          echo "STORE_PASSWORD hash:  $(printf '%s' "$STORE_PASS" | sha256sum | cut -d' ' -f1)"
          echo "KEY_ALIAS hash:       $(printf '%s' "$KEY_ALIAS" | sha256sum | cut -d' ' -f1)"
          echo "KEY_PASSWORD hash:    $(printf '%s' "$KEY_PASS" | sha256sum | cut -d' ' -f1)"
          printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > keystore.jks
          echo "Decoded size: $(wc -c < keystore.jks) bytes"
          echo "Decoded hash: $(sha256sum keystore.jks | cut -d' ' -f1)"
          file keystore.jks
          keytool -list \
            -keystore keystore.jks \
            -storepass "$STORE_PASS" \
            -alias "$KEY_ALIAS"

      - uses: actions/checkout@v4

      - name: Check KeePassDX upstream version
        id: keepassdx
        run: |
          stored=$(jq -r '.kunzisoft_keepassdx' versions.json)
          latest=$(curl -fsSL https://api.github.com/repos/Kunzisoft/KeePassDX/releases/latest | jq -r '.tag_name')
          echo "version=$latest" >> $GITHUB_OUTPUT
          [ "$stored" != "$latest" ] && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

  keepassdx:
    needs: prerequisites
    if: needs.prerequisites.outputs.keepassdx_changed == 'true'
    uses: ./.github/workflows/kunzisoft_keepassdx.yaml
    with:
      version: ${{ needs.prerequisites.outputs.keepassdx_version }}
    secrets:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  release:
    needs: [prerequisites, keepassdx]
    if: always() && needs.keepassdx.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Download KeePassDX APKs
        uses: actions/download-artifact@v4
        with:
          name: keepassdx-apks
          path: apks/keepassdx

      - name: Determine next release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName // "v0"' 2>/dev/null || echo "v0")
          num=$(echo "$latest" | sed 's/v//')
          echo "tag=v$((num + 1))" >> $GITHUB_OUTPUT

      - name: Compose release notes
        run: |
          echo "## Apps" > notes.md
          echo "- **KeePassDX** \`${{ needs.prerequisites.outputs.keepassdx_version }}\` — [upstream release](https://github.com/Kunzisoft/KeePassDX/releases/tag/${{ needs.prerequisites.outputs.keepassdx_version }})" >> notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file notes.md \
            $(find apks -name "*.apk")

  update-versions:
    needs: [prerequisites, keepassdx, release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update versions.json
        run: |
          VERSION="${{ needs.prerequisites.outputs.keepassdx_version }}"
          jq --arg v "$VERSION" '.kunzisoft_keepassdx = $v' versions.json > tmp.json
          mv tmp.json versions.json

      - name: Commit updated versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: release ${{ needs.release.outputs.tag }}"
          git push
